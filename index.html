<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wiom · CA June Sprint 2026 — Coded Prototype</title>
<link rel="stylesheet" href="app.css?v=6" />
<style>
  body{font-family:'Noto Sans','Noto Sans Devanagari',-apple-system,'Segoe UI',sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#fff 0%,#F1EDF7 60%);
    color:#161021;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  header.top{width:100%;display:flex;align-items:center;gap:14px;padding:14px 22px;
    border-bottom:1px solid #E8E4F0;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:30;}
  .logo{font-weight:800;letter-spacing:-.4px;font-size:17px;color:#D9008D;}
  .logo span{color:#161021;font-weight:600;}
  .subtitle{font-size:12.5px;color:#8A8A8A;}
  .spacer{flex:1;}
  .tbtn{border:1px solid #E8E4F0;background:#fff;color:#161021;font-size:13px;font-weight:600;
    border-radius:999px;padding:8px 14px;cursor:pointer;transition:.15s;}
  .tbtn:hover{border-color:#ccc;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;gap:30px;padding:34px 20px;width:100%;}
  .stage.hide{display:none;}
  .navarrow{border:1px solid #E8E4F0;background:#fff;width:48px;height:48px;border-radius:50%;
    cursor:pointer;font-size:20px;color:#161021;display:flex;align-items:center;justify-content:center;
    transition:.15s;flex:none;box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .navarrow:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-1px);}
  .navarrow:disabled{opacity:.3;cursor:default;box-shadow:none;transform:none;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .device{width:340px;height:680px;border-radius:18px;overflow:hidden;background:#FAF9FC;position:relative;
    box-shadow:0 18px 50px rgba(0,0,0,.18),0 2px 10px rgba(0,0,0,.10);border:1px solid #E8E4F0;cursor:pointer;}
  .backzone{position:absolute;left:0;top:0;width:20%;height:100%;z-index:50;cursor:w-resize;}
  .nexthint{position:absolute;right:12px;bottom:12px;z-index:60;background:rgba(217,0,141,.92);color:#fff;
    font-size:11px;font-weight:700;padding:7px 11px;border-radius:999px;pointer-events:none;
    box-shadow:0 4px 12px rgba(217,0,141,.4);animation:hintpulse 2.2s ease-in-out infinite;}
  @keyframes hintpulse{0%,100%{opacity:.5}50%{opacity:1}}
  .meta{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .counter{font-size:13px;color:#8A8A8A;font-weight:600;}
  .counter b{color:#161021;}
  .scname{font-size:12px;color:#8A8A8A;max-width:340px;text-align:center;}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:340px;justify-content:center;}
  .dot{width:7px;height:7px;border-radius:50%;background:#d6d6db;cursor:pointer;transition:.15s;}
  .dot.active{background:#D9008D;transform:scale(1.35);}
  .dot:hover{background:#b9b9c0;}
  .overview{display:none;width:100%;padding:24px 26px 60px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:22px;}
  .overview.show{display:grid;}
  .ov-card{cursor:pointer;}
  .ov-thumb{width:100%;aspect-ratio:340/680;border-radius:12px;border:1px solid #E8E4F0;overflow:hidden;
    position:relative;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.08);transition:.15s;}
  .ov-card:hover .ov-thumb{box-shadow:0 10px 26px rgba(0,0,0,.14);transform:translateY(-2px);}
  .ov-scaler{position:absolute;top:0;left:0;width:340px;height:680px;transform-origin:top left;}
  .ov-cap{font-size:12px;color:#5C5570;margin-top:8px;font-weight:600;}
  .ov-cap b{color:#161021;}
  footer{font-size:11.5px;color:#8A8A8A;padding:6px 0 22px;text-align:center;}
  kbd{background:#fff;border:1px solid #E8E4F0;border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;color:#161021;}
</style>
</head>
<body>
  <header class="top">
    <div class="logo">wiom<span> · prototype</span></div>
    <div class="subtitle">CA June Sprint 2026 — flow “copy of G” · coded</div>
    <div class="spacer"></div>
    <button class="tbtn" id="overviewBtn">▦ All screens</button>
    <button class="tbtn" id="restartBtn">↺ Restart</button>
  </header>

  <div class="stage" id="stage">
    <button class="navarrow" id="prevBtn" title="Previous (←)">‹</button>
    <div class="stack">
      <div class="device" id="device">
        <div class="backzone" id="backzone" title="Tap to go back"></div>
        <div class="nexthint" id="nexthint">Tap to continue ›</div>
      </div>
      <div class="meta">
        <div class="counter">Screen <b id="curNum">1</b> / <span id="total">29</span></div>
        <div class="scname" id="scName"></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
    <button class="navarrow" id="nextBtn" title="Next (→)">›</button>
  </div>

  <div class="overview" id="overview"></div>

  <footer>
    Coded HTML screens · tap to advance · tap left edge to go back · <kbd>←</kbd> <kbd>→</kbd> arrow keys · click a dot to jump
  </footer>

<!-- screen definitions: each part file pushes onto window.SCREENS in order -->
<script>window.SCREENS = [];</script>
<script src="parts/part-1.js?v=6"></script>
<script src="parts/part-2.js?v=6"></script>
<script src="parts/part-3.js?v=6"></script>
<script src="parts/part-4.js?v=6"></script>
<script src="parts/part-5.js?v=6"></script>

<script>
  const S = window.SCREENS;
  let i = 0;
  const device = document.getElementById('device');
  const backzone = document.getElementById('backzone');
  const nexthint = document.getElementById('nexthint');
  const curNum = document.getElementById('curNum');
  const scName = document.getElementById('scName');
  const dotsEl = document.getElementById('dots');
  document.getElementById('total').textContent = S.length;

  S.forEach((s,idx)=>{
    const d=document.createElement('div');d.className='dot';d.title=(idx+1)+'. '+s.name;
    d.onclick=(e)=>{e.stopPropagation();go(idx);};dotsEl.appendChild(d);
  });
  const dots=[...dotsEl.children];

  function screenMarkup(s){ return '<div class="app">'+s.html+'</div>'; }

  function render(){
    // rebuild device contents, keep backzone + hint
    device.querySelectorAll('.app').forEach(n=>n.remove());
    const wrap=document.createElement('div');
    wrap.innerHTML = screenMarkup(S[i]);
    device.insertBefore(wrap.firstElementChild, backzone);
    curNum.textContent=i+1;
    scName.textContent=S[i].name;
    dots.forEach((d,idx)=>d.classList.toggle('active',idx===i));
    document.getElementById('prevBtn').disabled=i===0;
    document.getElementById('nextBtn').disabled=i===S.length-1;
    nexthint.style.display=i===S.length-1?'none':'block';
  }
  function go(n){i=Math.max(0,Math.min(S.length-1,n));render();}
  function next(){if(i<S.length-1){i++;render();}}
  function prev(){if(i>0){i--;render();}}

  device.addEventListener('click',next);
  backzone.addEventListener('click',(e)=>{e.stopPropagation();prev();});
  document.getElementById('nextBtn').addEventListener('click',next);
  document.getElementById('prevBtn').addEventListener('click',prev);
  document.getElementById('restartBtn').addEventListener('click',()=>go(0));
  document.addEventListener('keydown',(e)=>{
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
    if(e.key==='ArrowLeft'){e.preventDefault();prev();}
    if(e.key==='Home')go(0); if(e.key==='End')go(S.length-1);
  });

  // overview
  const overview=document.getElementById('overview');
  const stage=document.getElementById('stage');
  function buildOverview(){
    overview.innerHTML='';
    S.forEach((s,idx)=>{
      const card=document.createElement('div');card.className='ov-card';
      card.innerHTML='<div class="ov-thumb"><div class="ov-scaler"><div class="app">'+s.html+'</div></div></div>'+
        '<div class="ov-cap"><b>'+(idx+1)+'.</b> '+s.name+'</div>';
      card.onclick=()=>{go(idx);toggleOverview(false);};
      overview.appendChild(card);
    });
    // scale thumbnails
    requestAnimationFrame(()=>{
      document.querySelectorAll('.ov-thumb').forEach(t=>{
        const sc=t.querySelector('.ov-scaler');
        const f=t.clientWidth/340; sc.style.transform='scale('+f+')';
      });
    });
  }
  function toggleOverview(show){
    if(show)buildOverview();
    overview.classList.toggle('show',show);
    stage.classList.toggle('hide',show);
    document.getElementById('overviewBtn').textContent=show?'⬅ Back to prototype':'▦ All screens';
  }
  let ovOpen=false;
  document.getElementById('overviewBtn').addEventListener('click',()=>{ovOpen=!ovOpen;toggleOverview(ovOpen);});

  render();
</script>
</body>
</html>
